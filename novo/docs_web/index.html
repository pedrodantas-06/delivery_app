<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png" type="image/x-icon">
    <title>Documentação das Rotas - Yummicious</title>
    <style>
        :root {
            --bg-color: #f9fafb;
            --sidebar-bg: #111827;
            --sidebar-text: #d1d5db;
            --text-color: #374151;
            --border-color: #e5e7eb;
            --primary: #0ea5e9;
            --get-color: #10b981;
            --post-color: #eab308;
            --delete-color: #ef4444;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            overflow-y: auto;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .sidebar h2 {
            padding: 0 20px;
            font-size: 1.2rem;
            color: white;
            margin-bottom: 20px;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            padding: 10px 20px;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }

        .menu-item:hover, .menu-item.active {
            background-color: #1f2937;
            color: white;
        }

        .submenu {
            list-style: none;
            padding: 0;
            margin: 0;
            background-color: #0b0f19;
            display: none;
        }

        .submenu.active {
            display: block;
        }

        .submenu li {
            padding: 8px 20px 8px 40px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .submenu li:hover, .submenu li.active {
            color: var(--primary);
        }

        /* Área Central */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: white;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            height: 100%;
        }

        /* Estado Inicial / Principal */
        .welcome-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }

        .welcome-text {
            font-size: 2.5rem;
            color: #111827;
            font-weight: bold;
        }

        /* Estilos do Endpoint */
        .endpoint-box {
            display: flex;
            align-items: center;
            background-color: #f3f4f6;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 30px;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .method {
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-right: 12px;
        }

        .method.GET { background-color: var(--get-color); }
        .method.POST { background-color: var(--post-color); }
        .method.DELETE { background-color: var(--delete-color); }

        h3 {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-top: 30px;
            color: #111827;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: #6b7280;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .param-name { font-weight: bold; color: #111827; }
        .param-type { color: var(--primary); font-size: 0.85rem; font-family: monospace; }
        .required { color: #ef4444; font-size: 0.8rem; font-weight: bold; }

        .response-container {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 20px;
        }

        .response-header {
            background-color: #f9fafb;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-code { color: var(--get-color); font-weight: bold; }
        .response-body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            margin: 0;
            font-family: monospace;
            overflow-x: auto;
        }
    </style>

</head>
<body>

    <div class="sidebar">
        <h2>Menu</h2>
        <ul class="menu-list" id="menu-container">
            <li class="menu-item active" id="btn-principal" onclick="renderPrincipal()">Yummicious</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="container" id="content-container"></div>
    </div>

    <script src="api_docs.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderPrincipal();
            carregarDadosLocais();
        });

        function renderPrincipal() {
            desmarcarTodosMenus();
            document.getElementById('btn-principal').classList.add('active');
            
            const container = document.getElementById('content-container');
            container.innerHTML = `
                <div class="welcome-container">
                    <div class="welcome-text">
                        <h1>😋 Yummicious 😋</h1>
                        <h3>Sua comida favorita, <br><span style="color: red;">onde você estiver</span>.</h3>
                        <p style="font-size: 0.85em;">O <strong>Yummicious</strong> é um aplicativo web de delivery projetado para conectar você aos melhores restaurantes da sua região com total praticidade.</p>
                    </div>
            `;
        }

        function carregarDadosLocais() {
            // Se o arquivo api_docs.js não existir ou não tiver dados, ignora silenciosamente
            if (typeof apiDados !== 'undefined' && apiDados.menus) {
                gerarMenuLateral(apiDados.menus);
            }
        }

        function gerarMenuLateral(menus) {
            const menuContainer = document.getElementById('menu-container');
            
            menus.forEach((menu, indexCategoria) => {
                const menuId = `menu-${indexCategoria}`;
                
                const liPai = document.createElement('li');
                liPai.className = 'menu-item';
                liPai.innerText = `${menu.categoria} ▾`;
                liPai.onclick = () => toggleSubmenu(menuId);
                menuContainer.appendChild(liPai);

                const ulSubmenu = document.createElement('ul');
                ulSubmenu.className = 'submenu';
                ulSubmenu.id = menuId;

                menu.endpoints.forEach((endpoint) => {
                    const liFilho = document.createElement('li');
                    liFilho.innerText = endpoint.titulo;
                    liFilho.onclick = (e) => {
                        e.stopPropagation();
                        desmarcarTodosMenus();
                        liFilho.classList.add('active');
                        renderEndpoint(endpoint);
                    };
                    ulSubmenu.appendChild(liFilho);
                });

                menuContainer.appendChild(ulSubmenu);
            });
        }

        function toggleSubmenu(id) {
            const submenu = document.getElementById(id);
            if (submenu) submenu.classList.toggle('active');
        }

        function desmarcarTodosMenus() {
            document.querySelectorAll('.menu-item, .submenu li').forEach(el => el.classList.remove('active'));
        }

        function renderEndpoint(data) {
            const container = document.getElementById('content-container');
            
            let pathParamsHTML = '';
            if (data.path_params && data.path_params.length > 0) {
                pathParamsHTML = `<h3>Path Params</h3><table><thead><tr><th>Parâmetro</th><th>Descrição</th></tr></thead><tbody>`;
                data.path_params.forEach(p => {
                    pathParamsHTML += `<tr><td><span class="param-name">${p.nome}</span> ${p.obrigatorio ? '<span class="required">required</span>' : ''}<br><span class="param-type">${p.tipo}</span></td><td>${p.descricao}</td></tr>`;
                });
                pathParamsHTML += `</tbody></table>`;
            }

            let queryParamsHTML = '';
            if (data.query_params && data.query_params.length > 0) {
                queryParamsHTML = `<h3>Query Params</h3><table><thead><tr><th>Parâmetro</th><th>Descrição</th></tr></thead><tbody>`;
                data.query_params.forEach(p => {
                    queryParamsHTML += `<tr><td><span class="param-name">${p.nome}</span> ${p.obrigatorio ? '<span class="required">required</span>' : ''}<br><span class="param-type">${p.tipo}</span></td><td>${p.descricao}</td></tr>`;
                });
                queryParamsHTML += `</tbody></table>`;
            }

            container.innerHTML = `
                <h1>${data.titulo}</h1>
                <p>${data.descricao_geral}</p>

                <div class="endpoint-box">
                    <span class="method ${data.metodo}">${data.metodo}</span>
                    <span class="url">${data.url}</span>
                </div>

                ${pathParamsHTML}
                ${queryParamsHTML}

                <h3>Response</h3>
                <div class="response-container">
                    <div class="response-header">
                        <span>Example Response</span>
                        <span class="status-code">${data.resposta_status}</span>
                    </div>
                    <pre class="response-body"><code>${JSON.stringify(data.resposta_exemplo, null, 2)}</code></pre>
                </div>
            `;
        }
    </script>
</body>
</html>
