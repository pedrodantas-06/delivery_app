services:
  db:
    image: mysql:latest
    container_name: ${DB_DATABASE}
    restart: always
    environment:
      - TZ=America/Sao_Paulo
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${SECRET_KEY}
    ports:
      - "3306:3306"
    volumes:
      - ./database/db_files:/var/lib/mysql
      - ./database/esquemas:/docker-entrypoint-initdb.d
    networks:
      - delivery_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: delivery_backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - delivery_network

  frontend:
    image: node:jod-alpine
    container_name: delivery_frontend
    restart: always
    working_dir: /app
    environment:
      - TZ="America/Sao_Paulo"
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    networks:
      - delivery_network

networks:
  delivery_network:
    driver: bridge
